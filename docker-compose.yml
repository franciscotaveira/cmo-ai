# ═══════════════════════════════════════════════════════════════════════════════
# CMO 360° PLATFORM — DOCKER COMPOSE
# ═══════════════════════════════════════════════════════════════════════════════
#
# Este arquivo sobe toda a infraestrutura do CMO 360°:
# • Backend (FastAPI + Python)
# • Frontend (React + Vite)
# • Database (Supabase - externo)
# • Redis (cache + WebSockets)
#
# USO:
#   docker-compose up -d          # Inicia tudo
#   docker-compose down           # Para tudo
#   docker-compose logs -f        # Ver logs
#   docker-compose ps             # Ver status
#
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # BACKEND (FastAPI + Python)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmo-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./backend:/app
      - ./drive_input:/app/data/input
      - ./obsidian_vault:/app/data/obsidian
    depends_on:
      - redis
    networks:
      - cmo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # FRONTEND (React + Vite)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: cmo-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - cmo-network

  # ─────────────────────────────────────────────────────────────────────────────
  # REDIS (Cache + WebSockets)
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cmo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cmo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # WATCHER (Monitora arquivos em background)
  # ─────────────────────────────────────────────────────────────────────────────
  watcher:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmo-watcher
    restart: unless-stopped
    command: python -m src.watcher_service
    environment:
      - PYTHONUNBUFFERED=1
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - PATH_TO_DRIVE=/app/data/input
      - PATH_TO_OBSIDIAN=/app/data/obsidian
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
      - ./drive_input:/app/data/input
      - ./obsidian_vault:/app/data/obsidian
    depends_on:
      - redis
      - backend
    networks:
      - cmo-network

  # ─────────────────────────────────────────────────────────────────────────────
  # NGINX (Reverse Proxy - Produção)
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cmo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - cmo-network
    profiles:
      - production

networks:
  cmo-network:
    driver: bridge

volumes:
  redis_data:

# ═══════════════════════════════════════════════════════════════════════════════
# VARIÁVEIS DE AMBIENTE
# ═══════════════════════════════════════════════════════════════════════════════
#
# Crie um arquivo .env na raiz com:
#
# SUPABASE_URL=https://seu-projeto.supabase.co
# SUPABASE_KEY=your-service-role-key
# SUPABASE_ANON_KEY=your-anon-key
# GROQ_API_KEY=gsk-your-key
# SECRET_KEY=your-secret-key-min-32-chars
#
# ═══════════════════════════════════════════════════════════════════════════════
